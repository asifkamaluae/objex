document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

type=text],input[type=email],input[type=password]{font-family:'Manrope';font-size:14px;color:#E9ECF1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:12px 14px;outline:none;width:100%}\n  input::placeholder{color:#565C68}\n  @keyframes objxPulse{0%,100%{opacity:1}50%{opacity:0.3}}\n  @keyframes objxGrid{0%{background-position:0 0}100%{background-position:60px 60px}}\n  @keyframes objxSpin{to{transform:rotate(360deg)}}\n  @keyframes objxPop{0%{transform:scale(0.7);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}\n  @keyframes objxRing{0%{transform:scale(0.5);opacity:0.7}100%{transform:scale(1.5);opacity:0}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;background:#0A0E18\">\n\n  <!-- ===================== HOME ===================== -->\n  <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"position:relative;overflow:hidden\">\n\n    <div style=\"position:sticky;top:0;z-index:40;backdrop-filter:blur(14px);background:rgba(10,11,14,0.72);border-bottom:1px solid rgba(255,255,255,0.06)\">\n      <div style=\"max-width:1280px;margin:0 auto;padding:16px 32px;display:flex;align-items:center;justify-content:space-between\">\n        <div style=\"display:flex;align-items:center;gap:11px\">\n          <div style=\"width:30px;height:30px;border-radius:8px;background:#13192a;border:1px solid rgba(242,194,51,0.45);display:flex;align-items:center;justify-content:center;box-shadow:0 0 22px rgba(242,194,51,0.45)\"><svg viewBox=\"0 0 32 32\" style=\"width:20px;height:20px;display:block\"><defs><clipPath id=\"ow\"><circle cx=\"16\" cy=\"16\" r=\"10.5\"><\u002Fcircle><\u002FclipPath><\u002Fdefs><circle cx=\"16\" cy=\"16\" r=\"10.8\" fill=\"none\" stroke=\"#F2C233\" stroke-width=\"1\" opacity=\"0.45\"><\u002Fcircle><g clip-path=\"url(#ow)\" fill=\"none\" stroke=\"#F2C233\" stroke-width=\"2.1\" stroke-linecap=\"round\"><path d=\"M3 11 q4.3 -3.4 8.5 0 t8.5 0 t8.5 0\"><\u002Fpath><path d=\"M3 16 q4.3 -3.4 8.5 0 t8.5 0 t8.5 0\"><\u002Fpath><path d=\"M3 21 q4.3 -3.4 8.5 0 t8.5 0 t8.5 0\"><\u002Fpath><\u002Fg><\u002Fsvg><\u002Fdiv>\n          <span style=\"font-family:'Cormorant Garamond',serif;font-weight:700;font-size:25px;letter-spacing:3px;color:#F2C233\">OBJEX<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:12px\">\n          <button onclick=\"{{ startDemo }}\" style=\"font-family:'Manrope';font-weight:600;font-size:13.5px;color:#E9ECF1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);padding:9px 17px;border-radius:9px;cursor:pointer;display:flex;align-items:center;gap:7px\"><span style=\"width:7px;height:7px;border-radius:50%;background:#F2C233;animation:objxPulse 1.6s infinite\"><\u002Fspan>Experience OBJEX<\u002Fbutton>\n          <button onclick=\"{{ openAuth }}\" style=\"font-family:'Manrope';font-weight:600;font-size:13.5px;color:#9aa1ad;background:transparent;border:1px solid rgba(255,255,255,0.1);padding:9px 17px;border-radius:9px;cursor:pointer\">Sign In<\u002Fbutton>\n          <button onclick=\"{{ launch }}\" style=\"font-family:'Manrope';font-weight:700;font-size:13.5px;color:#0A0E18;background:#F2C233;border:none;padding:9px 18px;border-radius:9px;cursor:pointer;box-shadow:0 0 20px rgba(242,194,51,0.3)\">Launch App<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(242,194,51,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(242,194,51,0.05) 1px,transparent 1px);background-size:60px 60px;animation:objxGrid 9s linear infinite;mask-image:radial-gradient(ellipse 90% 50% at 50% 0%,#000,transparent)\"><\u002Fdiv>\n    <div style=\"position:absolute;top:-160px;left:50%;transform:translateX(-50%);width:820px;height:480px;background:radial-gradient(ellipse,rgba(242,194,51,0.16),transparent 65%);pointer-events:none\"><\u002Fdiv>\n\n    <div style=\"position:relative;max-width:1180px;margin:0 auto;padding:60px 32px 30px;text-align:center\">\n      <div style=\"display:inline-flex;align-items:center;gap:9px;padding:7px 15px;border:1px solid rgba(242,194,51,0.3);border-radius:100px;background:rgba(242,194,51,0.06);font-size:12px;font-weight:600;color:#F2C233;margin-bottom:26px;letter-spacing:0.2px\"><span style=\"width:6px;height:6px;border-radius:50%;background:#F2C233;animation:objxPulse 1.8s infinite\"><\u002Fspan>LIVE PROTOCOL · A NEW FINANCIAL PRIMITIVE<\u002Fdiv>\n      <h1 style=\"font-family:'Space Grotesk';font-weight:700;font-size:62px;line-height:1.04;letter-spacing:-2px;margin-bottom:20px\">Transforming the World's Oldest Financial System into <span style=\"background:linear-gradient(120deg,#F2C233,#F7D06A 40%,#5B8DEF);-webkit-background-clip:text;background-clip:text;color:transparent\">Programmable Trading Capital<\u002Fspan><\u002Fh1>\n      <p style=\"font-size:18px;line-height:1.5;color:#9aa1ad;max-width:600px;margin:0 auto 34px;font-weight:500\">OBJEX transforms community savings into trading capital — access buying power, trade global markets, and fulfil obligations through code, not trust.<\u002Fp>\n\n      <!-- LIVE COUNTERS -->\n      <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.08);border-radius:16px;overflow:hidden;max-width:1080px;margin:0 auto\">\n        <sc-for list=\"{{ counters }}\" as=\"c\" hint-placeholder-count=\"5\">\n          <div style=\"background:#0E131F;padding:22px 14px;position:relative\">\n            <div style=\"position:absolute;top:14px;right:14px;width:6px;height:6px;border-radius:50%;background:#F2C233;animation:objxPulse 2s infinite\"><\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono';font-weight:700;font-size:25px;color:{{ c.color }};letter-spacing:-1px\">{{ c.value }}<\u002Fdiv>\n            <div style=\"font-size:11.5px;color:#6c727d;m >\n        <div style=\"font-size:11.5px;color:#565C68;text-align:center\">By connecting you agree to the protocol terms. Mock connection — no real wallet required.<\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ authIsSignup }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;flex-direction:column;gap:12px;margin-bottom:18px\"><input type=\"text\" placeholder=\"Full name\"><input type=\"email\" placeholder=\"Email address\"><input type=\"password\" placeholder=\"Create password\"><div style=\"display:flex;align-items:center;gap:9px;font-size:12px;color:#7d838f\"><span style=\"width:16px;height:16px;border-radius:5px;border:1px solid rgba(255,255,255,0.2);display:inline-block\"><\u002Fspan>Begin identity verification (KYC) after sign up<\u002Fdiv><\u002Fdiv>\n        <button onclick=\"{{ doConnect }}\" style=\"width:100%;font-family:'Manrope';font-weight:700;font-size:14px;color:#0A0E18;background:#F2C233;border:none;padding:13px;border-radius:11px;cursor:pointer\">Create Account<\u002Fbutton>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ authIsLogin }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;flex-direction:column;gap:12px;margin-bottom:18px\"><input type=\"email\" placeholder=\"Email address\"><input type=\"password\" placeholder=\"Password\"><\u002Fdiv>\n        <button onclick=\"{{ doConnect }}\" style=\"width:100%;font-family:'Manrope';font-weight:700;font-size:14px;color:#0A0E18;background:#F2C233;border:none;padding:13px;border-radius:11px;cursor:pointer\">Log In<\u002Fbutton>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- CREATE POOL FLOW -->\n  <sc-if value=\"{{ createOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed;inset:0;z-index:80;background:rgba(7,11,20,0.8);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:24px\">\n    <div style=\"width:480px;max-width:100%;background:linear-gradient(180deg,#121A2C,#0C1019);border:1px solid rgba(255,255,255,0.1);border-radius:20px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,0.6)\">\n\n      <!-- step 0: connect wallet -->\n      <sc-if value=\"{{ createStepConnect }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"padding:28px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:20px\"><span style=\"font-size:11px;font-weight:700;letter-spacing:1.2px;color:#F2C233\">CREATE POOL · CONNECT WALLET<\u002Fspan><span onclick=\"{{ closeCreate }}\" style=\"font-size:18px;color:#6c727d;cursor:pointer\">✕<\u002Fspan><\u002Fdiv>\n        <div style=\"font-family:'Space Grotesk';font-weight:700;font-size:23px;letter-spacing:-0.5px;margin-bottom:6px\">Connect your wallet<\u002Fdiv>\n        <div style=\"font-size:13px;color:#7d838f;margin-bottom:22px\">Connect a wallet to deploy your community pool on the protocol.<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px;margin-bottom:18px\">\n          <sc-for list=\"{{ wallets }}\" as=\"w\" hint-placeholder-count=\"4\"><div onclick=\"{{ createConnect }}\" style=\"display:flex;align-items:center;gap:13px;padding:14px;border-radius:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);cursor:pointer\"><div style=\"width:34px;height:34px;border-radius:9px;background:{{ w.c }};opacity:0.9\"><\u002Fdiv><span style=\"font-size:14px;font-weight:600;flex:1\">{{ w.n }}<\u002Fspan><span style=\"color:#565C68\">→<\u002Fspan><\u002Fdiv><\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"font-size:11.5px;color:#565C68;text-align:center\">Mock connection — no real wallet required.<\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- step 1: pool creation form -->\n      <sc-if value=\"{{ createStepForm }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:28px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:cen 0.07)\">\n            <div><div style=\"font-size:11px;color:#6c727d;margin-bottom:5px\">Pool Size<\u002Fdiv><div style=\"font-family:'JetBrains Mono';font-weight:700;font-size:16px\">{{ cpPoolSize }}<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-size:11px;color:#6c727d;margin-bottom:5px\">Buying Power<\u002Fdiv><div style=\"font-family:'JetBrains Mono';font-weight:700;font-size:16px;color:#F2C233\">{{ cpPoolSize }}<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-size:11px;color:#6c727d;margin-bottom:5px\">Duration<\u002Fdiv><div style=\"font-family:'JetBrains Mono';font-weight:700;font-size:16px\">{{ cpDuration }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ submitCreate }}\" style=\"width:100%;font-family:'Manrope';font-weight:700;font-size:14px;color:#0A0E18;background:#F2C233;border:none;padding:13px;border-radius:11px;cursor:pointer\">Launch Pool<\u002Fbutton>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- step 2: success -->\n      <sc-if value=\"{{ createStepSuccess }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:28px;text-align:center\">\n        <div style=\"display:flex;justify-content:flex-end;margin-bottom:4px\"><span onclick=\"{{ closeCreate }}\" style=\"font-size:18px;color:#6c727d;cursor:pointer\">✕<\u002Fspan><\u002Fdiv>\n        <div style=\"position:relative;width:88px;height:88px;margin:8px auto 22px\"><div style=\"position:absolute;inset:0;border-radius:50%;background:rgba(242,194,51,0.15);animation:objxRing 1.6s ease-out infinite\"><\u002Fdiv><div style=\"position:absolute;inset:0;border-radius:50%;background:linear-gradient(135deg,#F2C233,#B9830F);display:flex;align-items:center;justify-content:center;animation:objxPop .5s ease both\"><span style=\"font-size:40px;color:#0A0E18\">✓<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div style=\"font-family:'Space Grotesk';font-weight:700;font-size:22px;letter-spacing:-0.5px;margin-bottom:8px\">Pool created<\u002Fdiv>\n        <div style=\"font-size:14px;color:#9aa1ad;line-height:1.5;margin-bottom:6px\"><span style=\"color:#F2C233;font-weight:700\">{{ cpNameDisplay }}<\u002Fspan> is live with {{ cpPoolSize }} of community buying power.<\u002Fdiv>\n        <button onclick=\"{{ finishCreate }}\" style=\"width:100%;margin-top:18px;font-family:'Manrope';font-weight:700;font-size:14px;color:#0A0E18;background:#F2C233;border:none;padding:13px;border-radius:11px;cursor:pointer\">View in Marketplace →<\u002Fbutton>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- DEMO MODE -->\n  <sc-if value=\"{{ demoOn }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed;left:50%;bottom:28px;transform:translateX(-50%);z-index:90;width:560px;max-width:calc(100% - 40px)\">\n    <div style=\"background:linear-gradient(180deg,#141C2F,#0E131F);border:1px solid rgba(242,194,51,0.25);border-radius:18px;padding:22px 24px;box-shadow:0 24px 60px rgba(0,0,0,0.6),0 0 40px rgba(242,194,51,0.08)\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px\">\n        <div style=\"display:flex;align-items:center;gap:10px\"><div style=\"width:30px;height:30px;border-radius:9px;background:rgba(242,194,51,0.12);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono';font-size:12px;font-weight:700;color:#F2C233\">{{ demoData.n }}<\u002Fdiv><span style=\"font-size:11px;font-weight:700;letter-spacing:1px;color:#F2C233\">EXPERIENCE OBJEX · {{ demoStepNum }} / {{ demoTotal }}<\u002Fspan><\u002Fdiv>\n        <span onclick=\"{{ endDemo }}\" style=\"font-size:12.5px;color:#7d838f;cursor:pointer\">Exit demo ✕<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-family:'Space Grotesk';font-weight:700;font-size:21px;letter-spacing:-0.5px;margin-bottom:8px\">{{ demoData.title }}<\u002Fdiv>\n      <div style=\"font-size:13.5px;line-height:1.55;color:#9aa1ad;margin-bottom:1
